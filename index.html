<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Coast Ledger — Coast FIRE Planner</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,600&family=Public+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Chart.js + Flatpickr (vendored locally so the app works offline) -->
    <script src="js/vendor/chart.umd.min.js"></script>
    <script src="js/vendor/flatpickr.min.js"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/flatpickr.min.css">
    <link rel="stylesheet" href="css/flatpickr-theme.css">
    <link rel="stylesheet" href="css/profile.css">
    <link rel="stylesheet" href="css/ledger.css">
    <link rel="stylesheet" href="css/tracker.css">
    <link rel="stylesheet" href="css/guide.css">
</head>
<body>

    <nav id="app-nav"></nav>
    <div id="ui-root"></div>

    <!-- Toast -->
    <div id="toast" role="status"></div>
    <div id="confirm-layer" aria-hidden="true">
        <div id="confirm-prompt" role="alertdialog" aria-modal="true" aria-labelledby="confirm-message">
            <span id="confirm-message"></span>
            <input id="confirm-input" type="text" autocomplete="off">
            <span class="confirm-actions">
                <button type="button" data-confirm-cancel>Cancel</button>
                <button type="button" class="confirm-danger" data-confirm-accept>Delete</button>
            </span>
        </div>
    </div>

    <!-- Core -->
    <script src="js/engine.js"></script>
    <script src="js/util.js"></script>
    <script src="js/schema.js"></script>
    <script src="js/store.js"></script>
    <script src="js/forms.js"></script>

    <!-- Tracker core -->
    <script src="js/tracker/engine.js"></script>
    <script src="js/tracker/rocketmoney.js"></script>
    <script src="js/tracker/store.js"></script>
    <script src="js/tracker/kit.js"></script>

    <!-- Optional personal seed (git-ignored; see seed.example.js). Fetched
         first so the public site, which has no seed.js, never 404s. On
         file:// fetch is unavailable, so fall back to a plain script tag. -->
    <script>
    (function () {
        if (location.protocol === 'file:') {
            document.write('<script src="seed.js"><\/script>');
            return;
        }
        fetch('seed.js').then(function (r) { return r.ok ? r.text() : null; }).then(function (src) {
            if (!src) return;
            new Function(src)();
            if (window.FireApp && FireApp.refresh) FireApp.refresh();
        }).catch(function () { /* no seed */ });
    })();
    </script>

    <!-- Firebase (vendored compat SDK) + cloud sync. Config is public by
         design; access is governed by Auth + Firestore rules. -->
    <script src="js/vendor/firebase-app-compat.js"></script>
    <script src="js/vendor/firebase-auth-compat.js"></script>
    <script src="js/vendor/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/cloud.js"></script>

    <!-- UI -->
    <script src="js/ui/profile.js"></script>
    <script src="js/ui/ledger.js"></script>
    <script src="js/ui/tracker-observatory.js"></script>
    <script src="js/ui/tracker-cashbook.js"></script>
    <script src="js/ui/tracker-settings.js"></script>
    <script src="js/ui/guide.js"></script>

    <!-- Shell -->
    <script src="js/app.js"></script>
</body>
</html>
