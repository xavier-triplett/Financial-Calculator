<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Firebase SDK lazy-load test</title>
    <script src="test-bootstrap.js"></script>
</head>
<body>
    <pre id="out">RUNNING</pre>

    <script src="../js/firebase-config.js"></script>
    <script src="../js/firebase-loader.js"></script>
    <script src="../js/cloud.js"></script>

    <script>
    window.addEventListener('load', async function () {
        if (!window.FireTest || !FireTest.allowed) {
            document.getElementById('out').textContent = 'TEST DISABLED OUTSIDE LOCALHOST';
            return;
        }
        var out = [], failures = 0;
        function check(name, condition) {
            out.push((condition ? 'ok:   ' : 'FAIL: ') + name);
            if (!condition) failures++;
        }
        try {
            check('SDK is not parser-blocking', typeof window.firebase === 'undefined');
            check('real config is present', !!(window.FirebaseConfig && FirebaseConfig.apiKey && FirebaseConfig.projectId));
            check('loader is available before SDK load', FirebaseLoader.available() === true);
            check('cloud is available through loader', FireCloud.available() === true);

            var scheduled = FirebaseLoader.preload();
            var first = FirebaseLoader.load();
            var second = FirebaseLoader.load();
            check('concurrent loads share one promise', first === second);
            await Promise.all([scheduled, first]);

            check('loader reports ready', FirebaseLoader.ready() === true);
            check('firebase global is present', typeof firebase !== 'undefined');
            check('auth compat loaded', typeof firebase.auth === 'function');
            check('firestore compat loaded', typeof firebase.firestore === 'function');
            check('GoogleAuthProvider constructs', !!(new firebase.auth.GoogleAuthProvider()));
            check('serverTimestamp is available', typeof firebase.firestore.FieldValue.serverTimestamp === 'function');
            check('FireCloud.init initializes services', await FireCloud.init() === true);
            check('default Firebase app exists', firebase.apps.length === 1);
            check('auth() constructs', !!firebase.auth());
            check('firestore() constructs', !!firebase.firestore());
            check('cloud status reports initialized', FireCloud.status().initialized === true);
        } catch (error) {
            failures++;
            out.push('EXCEPTION: ' + error.message + '\n' + error.stack);
        }
        document.getElementById('out').textContent =
            (failures ? 'FBLOAD FAIL (' + failures + ')\n' : 'FBLOAD PASS\n') + out.join('\n');
    });
    </script>
</body>
</html>
